run:
  timeout: 5m

linters:
  disable:
    - lll
    - funlen
    - gochecknoglobals
    - gochecknoinits
    - godot
    - revive
    - depguard
    - nlreturn
    - stylecheck
    - gci
    - tagalign
    - wrapcheck
    - mnd
    - err113
    - tagliatelle
    - perfsprint

issues:
  max-same-issues: 0
  max-issues-per-linter: 0
